name: CI

on:
  push:
    branches:
      - release/jobtracker
      - main
      - master
  pull_request:
    branches:
      - release/jobtracker
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore backend/JobTracker.sln

      - name: Build
        run: dotnet build backend/JobTracker.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/JobTracker.sln --configuration Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      JOBS_API_BASE_URL: http://127.0.0.1:5296
      NEXT_PUBLIC_DEMO_ORGANIZATION_ID: a1000001-0000-4000-8000-000000000001
      NEXT_PUBLIC_DEMO_CUSTOMER_ID: a1000001-0000-4000-8000-000000000002

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose build
        run: docker compose build
